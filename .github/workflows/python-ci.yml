name: Python CI

on:
  push:
    paths:
      - "**.py"
      - "requirements.txt"
      - ".github/workflows/python-ci.yml"
  pull_request:
    paths:
      - "**.py"
      - "requirements.txt"
      - ".github/workflows/python-ci.yml"

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        shell: pwsh
        run: |
          pytest -q
